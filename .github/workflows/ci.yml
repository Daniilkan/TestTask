name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest ruff pytest-cov

      - name: Lint
        run: ruff check .

      - name: Run tests
        env:
          MOCK_LLM: "true"
          MOCK_CRM: "true"
        run: pytest --cov=app